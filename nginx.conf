# Nginx configuration for AOS Sidi Bouknadel
# Place this file in /etc/nginx/sites-available/aos-bouknadel
# Then create symlink: ln -s /etc/nginx/sites-available/aos-bouknadel /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name aos-bouknadel.dabahelp.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aos-bouknadel.dabahelp.com;

    # SSL Configuration (update paths after certbot)
    ssl_certificate /etc/letsencrypt/live/aos-bouknadel.dabahelp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aos-bouknadel.dabahelp.com/privkey.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;

    # Client body size for file uploads
    client_max_body_size 20M;

    # Proxy to Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static files caching
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Uploads directory
    location /uploads/ {
        alias /var/www/aos-bouknadel/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Robots.txt and Sitemap
    location /robots.txt {
        alias /var/www/aos-bouknadel/public/robots.txt;
    }

    location /sitemap.xml {
        alias /var/www/aos-bouknadel/public/sitemap.xml;
    }
}
